<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>8-Bit Brewing Co. — Murrieta, CA</title>

<style>

/* GLOBAL SCALE */
html { font-size: 175%; }

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:#FFB800;
  --gold-dim:#c48a00;
  --black:#000;
  --white:#fff;
  --dark:#0a0a0a;
  --pixel:'Press Start 2P', monospace;
}

body {
  font-family: var(--pixel);
  background:#000;
  color:#fff;
  line-height:1.6;
}

/* NAVBAR */
#navbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 24px;
  background:rgba(0,0,0,0.95);
  border-bottom:3px solid var(--gold);
  z-index:1000;
}

.nav-logo img {
  height:140px;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 6px rgba(255,184,0,0.4));
}

/* NAV LINKS */
.nav-links {
  display:flex;
  gap:40px;
  list-style:none;
}

.nav-links a {
  text-decoration:none;
  color:#fff;
  font-size:0.7rem;
}

.nav-links a:hover {
  color:var(--gold);
}

/* HAMBURGER */
.hamburger {
  display:none;
  flex-direction:column;
  gap:6px;
  background:none;
  border:none;
}

.hamburger span {
  width:30px;
  height:3px;
  background:var(--gold);
}

/* HERO */
#hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 20px;
}

.hero-title {
  font-size:clamp(2rem,5vw,4rem);
  color:var(--gold);
}

.hero-subtitle {
  font-size:0.7rem;
  opacity:0.7;
}

.btn {
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  font-size:0.6rem;
  text-decoration:none;
  border:none;
  min-height:48px;
}

.btn-gold {
  background:var(--gold);
  color:#000;
}

/* MOBILE UI */
@media (max-width: 900px) {

  html { font-size: 160%; }

  /* NAVBAR */
  .nav-links {
    display:none;
  }

  .hamburger {
    display:flex;
  }

  .nav-logo img {
    height:64px;
  }

  /* FULLSCREEN MENU */
  .nav-links.open {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:40px;
    position:fixed;
    inset:0;
    background:#000;
    font-size:1.4rem;
  }

  /* HERO */
  .hero-title {
    font-size:clamp(2rem,10vw,3rem);
  }

  .btn {
    width:100%;
  }

}

/* STICKY CTA (MOBILE ONLY) */
.mobile-cta {
  display:none;
}

@media (max-width:900px) {
  .mobile-cta {
    display:flex;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#000;
    border-top:3px solid var(--gold);
    z-index:999;
  }

  .mobile-cta a {
    flex:1;
    text-align:center;
    padding:16px;
    text-decoration:none;
    font-size:0.6rem;
  }

  .mobile-cta a:first-child {
    background:var(--gold);
    color:#000;
  }

  .mobile-cta a:last-child {
    color:var(--gold);
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav id="navbar">

  <a class="nav-logo">
    <img src="./logo.png" alt="8-Bit Brewing Co">
  </a>

  <ul class="nav-links" id="nav-links">
    <li><a href="#">Beer</a></li>
    <li><a href="#">Food</a></li>
    <li><a href="#">Shop</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>

</nav>

<!-- HERO -->
<section id="hero">

  <div>
    <h1 class="hero-title">8-BIT<br>BREWING CO.</h1>
    <p class="hero-subtitle">Craft Beer · Leveled Up</p>

    <a class="btn btn-gold">View Tap List</a>
  </div>

</section>

<!-- MOBILE CTA -->
<div class="mobile-cta">
  <a href="tel:19510000000">Call</a>
  <a href="https://maps.google.com">Directions</a>
</div>

<script>

/* HAMBURGER */
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');

hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('open');
});

</script>

</body>
</html>
