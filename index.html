<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>8-Bit Brewing Co. — Murrieta, CA</title>

<style>

/* GLOBAL SCALE FIX */
html {
  font-size: 175%;
}

/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* VARIABLES */
:root {
  --gold:#FFB800;
  --gold-dim:#c48a00;
  --gold-glow:#ffe066;
  --black:#000;
  --dark:#0a0a0a;
  --white:#f0f0f0;
  --pixel:'Press Start 2P', monospace;
}

/* BODY */
body {
  background:#000;
  color:#fff;
  font-family:var(--pixel);
  line-height:1.6;
}

/* NAVBAR */
#navbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 24px;
  background:rgba(0,0,0,0.9);
  border-bottom:3px solid var(--gold);
  z-index:1000;
}

/* LOGO FIX */
.nav-logo img {
  height:140px;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 6px rgba(255,184,0,0.4));
}

/* NAV LINKS */
.nav-links {
  display:flex;
  gap:40px;
  list-style:none;
}

.nav-links a {
  color:#fff;
  text-decoration:none;
  font-size:0.7rem;
  letter-spacing:0.1em;
}

.nav-links a:hover {
  color:var(--gold);
}

/* HERO */
#hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:#111;
}

/* HERO TEXT FIX */
.hero-title {
  font-size:clamp(2rem,5vw,4rem);
  color:var(--gold);
  text-shadow:
    3px 3px #000,
    6px 6px var(--gold-dim);
}

.hero-tagline {
  color:var(--gold);
  font-size:0.6rem;
  letter-spacing:0.3em;
}

.hero-subtitle {
  font-size:0.6rem;
  opacity:0.7;
}

/* BUTTONS */
.btn {
  font-size:0.6rem;
  padding:12px 24px;
  margin-top:20px;
}

.btn-gold {
  background:var(--gold);
  color:#000;
}

/* SECTION */
section {
  padding:80px 24px;
}

.section-title {
  font-size:1.2rem;
  color:var(--gold);
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav id="navbar">

  <a href="#" class="nav-logo">
    <img src="./logo.png" alt="8-Bit Brewing Co">
  </a>

  <ul class="nav-links">
    <li><a href="#beer">Beer</a></li>
    <li><a href="#food">Food</a></li>
    <li><a href="#shop">Shop</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <p class="hero-tagline">★ Murrieta, California ★</p>

    <h1 class="hero-title">
      8-BIT<br>BREWING CO.
    </h1>

    <p class="hero-subtitle">
      Craft Beer · Leveled Up
    </p>

    <div>
      <button class="btn btn-gold">View Tap List</button>
      <button class="btn">Enter Shop</button>
    </div>
  </div>
</section>

</body>
</html>
